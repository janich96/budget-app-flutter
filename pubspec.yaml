name: budget_app
description: "A new Flutter personal finance tracker app."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  
  # Dependency Injection
  get_it: ^9.2.1
  
  # Navigation
  go_router: ^17.3.0
  
  # Firebase
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  google_sign_in: ^7.2.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Code Generation & Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  
  # Functional Programming (for Error Handling)
  fpdart: ^1.1.0
  
  # Utils
  intl: ^0.20.2
  share_plus: ^13.2.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  
  # Code Generation
  build_runner: ^2.4.7
  freezed: ^4.0.0-dev.3
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: budget-icon.png
  android: true
  ios: true
  web:
    generate: true
    image_path: budget-icon.png
  macos:
    generate: true
    image_path: budget-icon.png
  windows:
    generate: true
    image_path: budget-icon.png
